<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MedicoScope - AI-powered medical imaging and health monitoring platform">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B35">

  <!-- SEO Meta Tags -->
  <meta name="keywords" content="medical, AI, health, imaging, diagnosis, telemedicine, vitals, mental health">
  <meta name="author" content="MedicoScope Team">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MedicoScope">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MedicoScope - AI Medical Platform</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Model Viewer for 3D models -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <style>
    /* Loading screen styles */
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #FFF5F0 0%, #FFE8D6 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }

    .loading-logo {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      background: linear-gradient(135deg, #FF6B35, #FF8C42);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(255, 107, 53, 0.3);
      animation: pulse 2s infinite;
    }

    .loading-logo svg {
      width: 50px;
      height: 50px;
      fill: white;
    }

    .loading-text {
      margin-top: 24px;
      font-size: 24px;
      font-weight: 700;
      color: #2D3748;
      letter-spacing: -0.5px;
    }

    .loading-subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #718096;
    }

    .loading-bar {
      margin-top: 32px;
      width: 200px;
      height: 4px;
      background: rgba(255, 107, 53, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar-fill {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #FF6B35, #FF8C42);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading">
    <div class="loading-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 3H5c-1.1 0-1.99.9-1.99 2L3 19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/>
      </svg>
    </div>
    <div class="loading-text">MedicoScope</div>
    <div class="loading-subtitle">AI-Powered Medical Platform</div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
